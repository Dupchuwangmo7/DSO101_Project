global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'aimath-education'
    environment: 'local'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: backend
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: frontend
    static_configs:
      - targets: ['frontend:3000']
    metrics_path: /api/metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
