name: CI/CD — AI Math Education

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aimath

jobs:

  # ─────────────────────────────────────────────────────
  # Job 1: Backend — lint, typecheck, unit + e2e tests
  # ─────────────────────────────────────────────────────
  backend-ci:
    name: "Backend — Test & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       education_math_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST:       localhost
      DB_PORT:       5432
      DB_USERNAME:   postgres
      DB_PASSWORD:   postgres
      DB_DATABASE:   education_math_test
      JWT_SECRET:    ci_test_secret_not_for_prod
      COOKIE_SECRET: ci_cookie_secret
      NODE_ENV:      test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  

      - name: Build TypeScript
        run: npm run build

  # ─────────────────────────────────────────────────────
  # Job 2: Frontend — lint, typecheck, unit tests, build
  # ─────────────────────────────────────────────────────
  frontend-ci:
    name: "Frontend — Test & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --no-coverage

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001

  # ─────────────────────────────────────────────────────
  # Job 3: Security scanning
  # ─────────────────────────────────────────────────────
  security-scan:
    name: "Security — SAST & Dependency Audit"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

      - name: npm audit — backend
        working-directory: backend
        run: |
          npm install --legacy-peer-deps
          npm audit --audit-level=high || true

      - name: npm audit — frontend
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm audit --audit-level=high || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ─────────────────────────────────────────────────────
  # Job 4: Docker build → Trivy scan → push to GHCR
  # Only runs on push to main
  # ─────────────────────────────────────────────────────
  docker-build-push:
    name: "Docker — Build, Scan & Push"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image ──────────────────────────────
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta-backend.outputs.tags }}
          labels:     ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          format:    sarif
          output:    trivy-backend.sarif
          severity:  CRITICAL,HIGH
          exit-code: 1
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF (backend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

      # ── Frontend image ─────────────────────────────
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta-frontend.outputs.tags }}
          labels:     ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          format:    sarif
          output:    trivy-frontend.sarif
          severity:  CRITICAL,HIGH
          exit-code: 0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF (frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif

  # ─────────────────────────────────────────────────────
  # Job 5: Deploy to Render via deploy hooks
  # ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy — Render"
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://dso101-project-frontend.onrender.com

    steps:
      - name: Trigger backend deploy on Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}")
          echo "Backend deploy hook status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || exit 1

      - name: Trigger frontend deploy on Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}")
          echo "Frontend deploy hook status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || exit 1

